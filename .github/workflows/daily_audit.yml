name: Daily Audit Report

on:
  schedule:
    - cron: '0 3 * * *'   # 3am UTC = 6am EAT (UTC+3)
  workflow_dispatch:        # allows manual trigger from GitHub UI
  push:
    branches: [master]      # temporary: fires on push to test

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install gspread google-auth pandas openpyxl

      - name: Download and merge audit sheets
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python merge_audit.py

      - name: Send email with merged file
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python send_audit_email.py
